<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Welcome Here You can Calculate your BMI</h1>
    <form>
      <label for="height">Enter the height in CM</label>
      <br />
      <input type="text" id="height" />
      <br />
      <br />
      <label for="weight">Enter the weight in KG</label>
      <br />
      <input type="text" name="weight" id="weight" />
      <br />
      <br />
      <button>Submit</button>
    </form>
    <hr />
    <h2 id="result">Result :</h2>
    <p>Under wait = Less than 18.6</p>
    <p>Normal range = 18.6 to 24.9</p>
    <p>Overweight = Greater than 24.9</p>
    <div class="result"></div>
  </body>
  <script>
    const form = document.querySelector("form");
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const height = parseInt(document.querySelector("#height").value);
      const weight = Number(document.querySelector("#weight").value);
      const result = document.querySelector("#result");

      if (height === " " || height <= 0 || isNaN(height)) {
        result.textContent = "please enter the valide `${height}`";
      } else if (weight === " " || weight <= 0 || isNaN(weight)) {
        result.textContent = "please enter the valid weight `${weight}`";
      } else {
        const bmi = (weight / ((height * height) / 10000)).toFixed(2);
        if (bmi < 18.6) {
          result.innerHTML = `Under wait BMI is : ${bmi}`;
          result.style.color = "green";
        } else if (bmi >= 18.6 && bmi <= 24.9) {
          result.innerHTML = `Normal range BMI is : ${bmi}`;
          result.style.color = "yellow";
        } else {
          result.innerHTML = `Overweight BMI is : ${bmi}`;
          result.style.color = "red";
        }
      }
    });
  </script>
</html>
