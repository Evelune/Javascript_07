<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="content">
      <div class="main">
        <h1>Calculate BMI</h1>
        <p>Enter the details</p>
      </div>
      <form action="">
        <div class="form-group">
          <label for="height">Enter the height in CM</label>
          <input type="text" id="height"/>
        </div>

        <div class="form-group">
          <label for="weight">Enter the weight in kg</label>
          <input type="text" id="weight"/>
        </div>
        <div class="button">
            <button>Calculate</button>
          </div>
      </form>
      <div class="result">
        <h2>Result:-</h2>
        <p id="output"></p>
      </div>
      <div class="bmiInformation">
        <h2>BMI Weight Guide</h2>
        <ul id="w">
          <li id="uw">Under Weight:- Less than 18.8</li>
          <li id="nw">Normal Weight:- 18.8 and 24.9</li>
          <li id="ow">Over Weight:- Greater than 24.9</li>
        </ul>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
